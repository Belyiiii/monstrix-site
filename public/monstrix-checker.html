<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONSTRIX — Network Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #fff;
    padding: 20px;
    min-height: 100vh;
  }
  .container { max-width: 420px; margin: 0 auto; }
  .logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
  h1 { color: #ff6b35; text-align: center; margin-bottom: 4px; font-size: 24px; }
  .subtitle { text-align: center; color: #aaa; margin-bottom: 24px; font-size: 14px; }

  .btn-check {
    width: 100%;
    padding: 15px;
    background: #ff6b35;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 20px;
    font-weight: bold;
    transition: background 0.2s;
  }
  .btn-check:hover { background: #ff8c5a; }
  .btn-check:disabled { background: #555; cursor: not-allowed; }

  .summary {
    display: none;
    background: #16213e;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #aaa;
    text-align: center;
  }
  .summary span { color: #fff; font-size: 18px; font-weight: bold; }
  .ok-count { color: #4CAF50; }
  .fail-count { color: #e94560; }

  .section-label {
    color: #aaa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 16px 0 8px 4px;
  }

  .card {
    background: #16213e;
    border-radius: 10px;
    margin-bottom: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.2s;
  }
  .card-icon { font-size: 24px; width: 32px; text-align: center; flex-shrink: 0; }
  .card-info { flex: 1; }
  .card-name { font-size: 15px; font-weight: bold; }
  .card-url { font-size: 11px; color: #555; margin-top: 2px; }
  .card-status {
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
    min-width: 70px;
    text-align: right;
  }

  .status-idle { color: #555; }
  .status-checking {
    color: #ff6b35;
    animation: pulse 0.8s infinite alternate;
  }
  .status-ok { color: #4CAF50; }
  .status-fail { color: #e94560; }

  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

  .ping-time {
    font-size: 11px;
    color: #aaa;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }

  .add-section {
    background: #16213e;
    border-radius: 10px;
    padding: 16px;
    margin-top: 20px;
  }
  .add-section h2 {
    color: #ff6b35;
    font-size: 14px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #333;
  }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-row input {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: #0f0f23;
    color: #fff;
    font-size: 14px;
  }
  .add-row input:focus { outline: 2px solid #ff6b35; }
  .btn-add {
    padding: 10px 16px;
    background: #ff6b35;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-add:hover { background: #ff8c5a; }

  .footer {
    text-align: center;
    color: #333;
    font-size: 11px;
    margin-top: 30px;
    padding-bottom: 10px;
  }
  .footer a { color: #555; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📡</div>
  <h1>MONSTRIX</h1>
  <p class="subtitle">Network Checker — проверка доступности</p>

  <button class="btn-check" id="checkBtn" onclick="checkAll()">⚡ Проверить всё</button>

  <div class="summary" id="summary">
    <span class="ok-count" id="okCount">0</span> доступно &nbsp;·&nbsp;
    <span class="fail-count" id="failCount">0</span> недоступно
  </div>

  <div class="section-label">📱 Мессенджеры и соцсети</div>
  <div id="list-social"></div>

  <div class="section-label">🎬 Видео и музыка</div>
  <div id="list-media"></div>

  <div class="section-label">🌐 Сервисы</div>
  <div id="list-services"></div>

  <div class="section-label">🇷🇺 Российские</div>
  <div id="list-ru"></div>

  <div class="add-section">
    <h2>➕ Добавить свой сайт</h2>
    <div class="add-row">
      <input type="text" id="customName" placeholder="Название" style="max-width:110px">
      <input type="text" id="customUrl" placeholder="https://example.com">
    </div>
    <div class="add-row">
      <button class="btn-add" onclick="addCustom()" style="width:100%">Добавить и проверить</button>
    </div>
  </div>

  <div id="list-custom"></div>

  <div class="footer">
    <a href="https://monstrix.ru">monstrix.ru</a> · @igortechminimal
  </div>
</div>

<script>
const SERVICES = {
  social: [
    { name: "Telegram", url: "https://telegram.org", icon: "✈️" },
    { name: "Instagram", url: "https://www.instagram.com", icon: "📸" },
    { name: "ВКонтакте", url: "https://vk.com", icon: "💙" },
    { name: "TikTok", url: "https://www.tiktok.com", icon: "🎵" },
    { name: "Twitter / X", url: "https://x.com", icon: "🐦" },
    { name: "Facebook", url: "https://www.facebook.com", icon: "👤" },
  ],
  media: [
    { name: "YouTube", url: "https://www.youtube.com", icon: "▶️" },
    { name: "Spotify", url: "https://open.spotify.com", icon: "🎧" },
    { name: "Netflix", url: "https://www.netflix.com", icon: "🎬" },
    { name: "Twitch", url: "https://www.twitch.tv", icon: "🟣" },
  ],
  services: [
    { name: "Google", url: "https://www.google.com", icon: "🔍" },
    { name: "GitHub", url: "https://github.com", icon: "🐙" },
    { name: "ChatGPT", url: "https://chat.openai.com", icon: "🤖" },
    { name: "Discord", url: "https://discord.com", icon: "🎮" },
    { name: "Wikipedia", url: "https://www.wikipedia.org", icon: "📖" },
  ],
  ru: [
    { name: "Яндекс", url: "https://ya.ru", icon: "🔴" },
    { name: "Mail.ru", url: "https://mail.ru", icon: "📧" },
    { name: "Авито", url: "https://www.avito.ru", icon: "🛒" },
    { name: "Ozon", url: "https://www.ozon.ru", icon: "📦" },
    { name: "Госуслуги", url: "https://gosuslugi.ru", icon: "🏛️" },
  ],
};

const customServices = [];

function getCardId(url) {
  return "card_" + url.replace(/[^a-z0-9]/gi, "_");
}

function renderCard(service, listId) {
  const id = getCardId(service.url);
  const hostShort = service.url.replace(/^https?:\/\/(www\.)?/, "").split("/")[0];
  const div = document.createElement("div");
  div.className = "card";
  div.id = id;
  div.innerHTML = `
    <div class="card-icon">${service.icon || "🌐"}</div>
    <div class="card-info">
      <div class="card-name">${service.name}</div>
      <div class="card-url">${hostShort}</div>
    </div>
    <div class="card-status status-idle" id="status_${id}">—</div>
  `;
  document.getElementById(listId).appendChild(div);
}

function renderAll() {
  for (const [key, list] of Object.entries(SERVICES)) {
    list.forEach(s => renderCard(s, "list-" + key));
  }
}

async function checkOne(service) {
  const id = getCardId(service.url);
  const statusEl = document.getElementById("status_" + id);
  statusEl.className = "card-status status-checking";
  statusEl.innerHTML = "...";

  const t0 = Date.now();
  try {
    await fetch(service.url, {
      method: "HEAD",
      mode: "no-cors",
      cache: "no-cache",
      signal: AbortSignal.timeout(6000),
    });
    const ms = Date.now() - t0;
    statusEl.className = "card-status status-ok";
    statusEl.innerHTML = `✅ OK<span class="ping-time">${ms} мс</span>`;
    return true;
  } catch (e) {
    statusEl.className = "card-status status-fail";
    statusEl.innerHTML = "❌ Нет";
    return false;
  }
}

async function checkAll() {
  const btn = document.getElementById("checkBtn");
  btn.disabled = true;
  btn.textContent = "⏳ Проверяю...";

  document.getElementById("summary").style.display = "none";

  const allServices = [
    ...SERVICES.social,
    ...SERVICES.media,
    ...SERVICES.services,
    ...SERVICES.ru,
    ...customServices,
  ];

  // Reset all
  allServices.forEach(s => {
    const id = getCardId(s.url);
    const el = document.getElementById("status_" + id);
    if (el) { el.className = "card-status status-idle"; el.innerHTML = "—"; }
  });

  const results = await Promise.all(allServices.map(s => checkOne(s)));

  const ok = results.filter(Boolean).length;
  const fail = results.length - ok;

  document.getElementById("okCount").textContent = ok;
  document.getElementById("failCount").textContent = fail;
  document.getElementById("summary").style.display = "block";

  btn.disabled = false;
  btn.textContent = "🔄 Проверить снова";
}

function addCustom() {
  const name = document.getElementById("customName").value.trim();
  let url = document.getElementById("customUrl").value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  const service = { name: name || url, url, icon: "🌐" };
  customServices.push(service);
  renderCard(service, "list-custom");
  document.getElementById("customName").value = "";
  document.getElementById("customUrl").value = "";
  checkOne(service);
}

renderAll();
</script>
</body>
</html>
